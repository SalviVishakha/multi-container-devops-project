version: '3.9'

services:
  frontend:
    build: ./frontend
    container_name: frontend-container
    ports:
      - "3000:3000"
    depends_on:
      - backend
  backend:
    build: ./backend
    container_name: backend-container
    ports:
      - "5002:5000"

    environment:
      DB_USER: admin
      DB_PASSWORD: password
      DB_NAME: mydb
      DB_HOST: postgres
      DB_PORT: 5432

    depends_on:
      - postgres

  postgres:
    image: postgres:16

    container_name: postgres-container

    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: password
      POSTGRES_DB: mydb

    ports:
      - "5432:5432"

    volumes:
      - postgres-data:/var/lib/postgresql/data

volumes:
  postgres-data: